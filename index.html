<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高級抽獎模擬器 試試你的運氣</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff47bc;
            --dark-pink: #d4148d;
            --bg-dark: #0f071a;
            --accent-gold: #ffde59;
            --card-bg: #1e122d;
            --text-gray: #b0b0b0;
        }

        /* --- 原有樣式完全保留 --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            padding-bottom: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .header-nav { width: 100%; max-width: 500px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .balance-box { background: rgba(0, 0, 0, 0.6); border: 1.5px solid var(--primary-pink); padding: 6px 18px; border-radius: 25px; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; font-weight: 900; }
        .balance-box span { color: var(--accent-gold); font-size: 1.1rem; }
        .nav-right { display: flex; gap: 12px; align-items: center; }
        .icon-btn { cursor: pointer; transition: 0.2s; font-size: 1.4rem; }

        .boss-bar { width: 92%; max-width: 460px; height: 85px; background: linear-gradient(90deg, #b71c1c 0%, #e53935 100%); border-radius: 45px 15px 15px 45px; margin: 10px 0 20px 0; display: flex; align-items: center; padding: 0 20px 0 5px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .boss-avatar { width: 75px; height: 75px; background: #f5c78e; border-radius: 50%; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin-right: 12px; }
        .boss-main { flex: 1; }
        .boss-name { font-weight: 900; font-size: 1.1rem; }
        .boss-lv { background: #fff; color: #d32f2f; font-size: 0.65rem; padding: 1px 5px; border-radius: 4px; font-weight: 900; margin-left: 5px; }

        .prize-grid { width: 92%; max-width: 460px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .prize-card { background: var(--card-bg); border-radius: 12px; padding: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .prize-icon { font-size: 1.8rem; display: block; margin-bottom: 5px; }
        .prize-name { font-size: 0.65rem; color: var(--text-gray); height: 1.2rem; overflow: hidden; }
        .prize-val { font-size: 0.9rem; font-weight: 900; color: #fff; }

        .lucky-box { width: 92%; max-width: 460px; background: rgba(255, 71, 188, 0.05); border: 1px solid rgba(255, 71, 188, 0.2); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .lucky-title { font-weight: 900; color: var(--accent-gold); font-size: 0.9rem; margin-bottom: 10px; }
        .lucky-list { max-height: 120px; overflow-y: auto; }
        .lucky-item { font-size: 0.75rem; color: #eee; margin-bottom: 8px; padding-left: 10px; border-left: 3px solid var(--primary-pink); }

        .draw-controls { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: rgba(15, 7, 26, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; padding: 15px 10px 35px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 500; }
        .draw-btn-unit { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .draw-ball { width: 68px; height: 50px; border-radius: 30px; background: linear-gradient(180deg, #ff71c8 0%, #e6008e 100%); box-shadow: 0 4px 0 #b3006f; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-size: 1.3rem; margin-bottom: 5px; position: relative; }
        .draw-ball::after { content: ''; position: absolute; top: 15%; left: 20%; width: 30%; height: 20%; background: rgba(255,255,255,0.4); border-radius: 50%; }
        .draw-ball.purple { background: linear-gradient(180deg, #9b27af 0%, #691a99 100%); box-shadow: 0 4px 0 #4a136b; }
        .draw-btn-unit:active .draw-ball { transform: translateY(3px); box-shadow: 0 1px 0 #b3006f; }
        .draw-price { font-size: 0.75rem; color: #888; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .slot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; border: 1px solid var(--primary-pink); margin-bottom: 30px; }
        .slot-box { width: 90px; height: 90px; background: #000; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid #333; }
        .slot-strip { position: absolute; width: 100%; }
        .slot-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; }
        .slot-box.win-top { border-color: var(--accent-gold); box-shadow: 0 0 20px var(--accent-gold); }

        /* 影片播放層 */
        #foxVideoLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5000; display: none; background: #000;
            justify-content: center; align-items: center;
        }
        #foxVideoLayer video { width: 100%; height: 100%; object-fit: contain; }

        .modal-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; display: none; justify-content: center; align-items: center; }
        .modal-body { background: #1e0b33; width: 92%; max-width: 460px; border-radius: 30px; padding: 25px; border: 2.5px solid var(--primary-pink); position: relative; }
        .setting-header-row { display: grid; grid-template-columns: 2fr 1fr 1.2fr 35px; gap: 8px; color: var(--accent-gold); font-size: 0.75rem; text-align: center; margin-bottom: 10px; }
        .prize-edit-list { max-height: 280px; overflow-y: auto; margin-bottom: 15px; }
        .edit-row { display: grid; grid-template-columns: 2fr 1fr 1.2fr 35px; gap: 8px; margin-bottom: 10px; align-items: center; }
        .edit-row input { background: #000; border: 1px solid #444; color: #fff; padding: 10px 5px; border-radius: 8px; font-size: 0.85rem; width: 100%; text-align: center; }
        .del-btn { color: #f44336; font-size: 1.4rem; cursor: pointer; border: none; background: none; }
        .prob-sum-box { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; font-size: 0.85rem; }
        .btn-yellow { background: var(--accent-gold); color: #000; width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; font-size: 1rem; cursor: pointer; margin-bottom: 12px; }
        .btn-pink { background: var(--primary-pink); color: #fff; width: 100%; padding: 14px; border-radius: 30px; border: none; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
        .btn-dark { background: #333; color: #fff; width: 100%; padding: 14px; border-radius: 30px; border: none; font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
        .inv-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div id="foxVideoLayer">
    <video id="winVideo" playsinline>
        <source id="videoSrc" src="" type="video/mp4">
    </video>
</div>

<div class="header-nav">
    <div class="balance-box">餘額 <span id="balDisplay">$10,000</span></div>
    <div class="nav-right">
        <div class="icon-btn" onclick="openModal('rechargeModal')">➕</div>
        <div class="icon-btn" onclick="openInventory()">📦</div>
        <div class="icon-btn" onclick="openModal('settingsModal')">⚙️</div>
    </div>
</div>

<div class="boss-bar">
    <div class="boss-avatar">👨‍🎤</div>
    <div class="boss-main">
        <div class="boss-name">超臭魔王<span class="boss-lv">LV.99</span></div>
        <div style="font-size: 0.8rem; opacity: 0.8;">我是Sweet超好中</div>
    </div>
</div>

<div class="prize-grid" id="mainGrid"></div>

<div class="lucky-box">
    <div class="lucky-title">🏆 幸運頭獎紀錄</div>
    <div class="lucky-list" id="luckyList">暫無中獎紀錄</div>
</div>

<div class="draw-controls">
    <div class="draw-btn-unit" onclick="handleDraw(1)">
        <div class="draw-ball">x1</div>
        <div class="draw-price" id="p1_cost">$50</div>
    </div>
    <div class="draw-btn-unit" onclick="handleDraw(3)">
        <div class="draw-ball">x3</div>
        <div class="draw-price" id="p3_cost">$150</div>
    </div>
    <div class="draw-btn-unit" onclick="handleDraw(5)">
        <div class="draw-ball">x5</div>
        <div class="draw-price" id="p5_cost">$250</div>
    </div>
    <div class="draw-btn-unit" onclick="handleDraw(12)">
        <div class="draw-ball purple">x12</div>
        <div class="draw-price" id="p12_cost" style="color:var(--accent-gold)">$600</div>
    </div>
</div>

<div id="drawOverlay" class="overlay">
    <div style="color:var(--primary-pink); font-weight:900; font-size:1.3rem; margin-bottom:20px; letter-spacing:2px;">恭喜!!</div>
    <div class="slot-grid" id="slotGrid"></div>
    <div id="drawActions" style="display:none; width:85%; max-width:400px; gap:15px;">
        <button class="btn-dark" style="flex:1" onclick="closeDraw()">確認</button>
        <button class="btn-pink" style="flex:1" id="retryBtn" onclick="retryDraw()"></button>
    </div>
</div>

<div id="settingsModal" class="modal-wrap"><div class="modal-body"><h3 style="color:var(--primary-pink); margin-top:0;">遊戲參數設定</h3><div style="margin-bottom:20px; font-weight:bold;">一抽價格：<input type="number" id="setPrice" style="width:80px; background:#000; color:var(--accent-gold); border:1px solid #444; padding:8px; border-radius:8px; text-align:center;"><span style="color:#666; margin-left:5px;">$</span></div><div class="setting-header-row"><div>名稱</div><div>機率%</div><div>價值$</div><div></div></div><div id="prizeEditList" class="prize-edit-list"></div><div class="prob-sum-box" id="probSumBox">目前機率總計：<span id="probSumText">0%</span></div><button class="btn-yellow" onclick="addNewPrize()">+ 新增獎項</button><button class="btn-pink" onclick="saveSettings()">儲存並關閉</button></div></div>
<div id="rechargeModal" class="modal-wrap"><div class="modal-body" style="text-align:center;"><h2 style="color:var(--accent-gold)">儲值中心</h2><div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"><button class="btn-pink" onclick="doRecharge(1000)">$1,000</button><button class="btn-pink" onclick="doRecharge(5000)">$5,000</button><button class="btn-pink" onclick="doRecharge(10000)">$10,000</button><button class="btn-pink" onclick="doRecharge(50000)">$50,000</button></div><button class="btn-dark" onclick="closeModal('rechargeModal')">返回遊戲</button></div></div>
<div id="invModal" class="modal-wrap"><div class="modal-body"><h3 style="margin-top:0;">我的賞櫃</h3><div id="invList" style="max-height:280px; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:15px;"></div><div style="margin-top:20px; text-align:right; font-weight:900;">回收總價值：<span id="recycleVal" style="color:var(--accent-gold)">$0</span></div><button class="btn-yellow" style="margin-top:15px;" onclick="recycleAll()">一鍵回收 (100% 價值)</button><button class="btn-dark" onclick="closeModal('invModal')">關閉</button></div></div>

<script>
    let state = {
        balance: 10000,
        price: 50,
        totalCount: 0,
        inventory: [],
        lastTimes: 1,
        prizes: [
            { name: "iPhone 15 Pro", prob: 0.2, val: 36900, icon: "📱", isTop: true },
            { name: "PS5 Slim", prob: 0.8, val: 17500, icon: "🎮", isTop: true },
            { name: "AirPods Max", prob: 2.0, val: 18000, icon: "🎧", isTop: true },
            { name: "小米手環 8", prob: 12.0, val: 1095, icon: "⌚", isTop: false },
            { name: "行動電源", prob: 25.0, val: 790, icon: "🔋", isTop: false },
            { name: "造型貼紙", prob: 60.0, val: 50, icon: "🏷️", isTop: false }
        ]
    };

    function init() {
        const grid = document.getElementById('slotGrid');
        grid.innerHTML = Array(12).fill(0).map((_, i) => `<div class="slot-box" id="slot-${i}"><div class="slot-strip" id="strip-${i}"><div class="slot-item">?</div></div></div>`).join('');
        updateUI();
        renderMainGrid();
    }

    function playWinVideo(videoFile) {
        const layer = document.getElementById('foxVideoLayer');
        const video = document.getElementById('winVideo');
        const source = document.getElementById('videoSrc');

        source.src = videoFile;
        layer.style.display = 'flex';
        video.load(); 
        video.currentTime = 0;
        video.play().catch(e => {
            console.warn("自動播放受限", e);
            layer.style.display = 'none';
        });
        video.onended = () => { layer.style.display = 'none'; };
    }

    async function handleDraw(times) {
        state.lastTimes = times;
        const cost = state.price * times;
        if(state.balance < cost) { alert("餘額不足！"); return; }
        state.balance -= cost;
        updateUI();

        document.getElementById('drawOverlay').style.display = 'flex';
        document.getElementById('drawActions').style.display = 'none';
        document.getElementById('retryBtn').innerText = `再抽 ${times} 次`;

        let anims = [];
        let winners = [];
        let playFile = "";

        for(let i=0; i<12; i++) {
            const slot = document.getElementById(`slot-${i}`);
            slot.classList.remove('win-top');
            if(i < times) {
                state.totalCount++;
                const winner = pickWinner();
                
                // ✨ 兩部影片判定邏輯
                if(winner.name.includes("iPhone")) playFile = "fox_win.mp4"; 
                if(winner.name.includes("PS5")) playFile = "legend_win.mp4"; 

                winners.push({ winner, local: i+1, global: state.totalCount });
                anims.push(runSlotAnim(i, winner));
                slot.style.opacity = "1";
            } else {
                slot.style.opacity = "0.05";
                document.getElementById(`strip-${i}`).innerHTML = '';
            }
        }

        if(playFile !== "") {
            setTimeout(() => { playWinVideo(playFile); }, 1200);
        }

        await Promise.all(anims);
        winners.forEach(w => {
            state.inventory.push(w.winner);
            if(w.winner.isTop) pushRecord(w.winner.name, w.local, w.global);
        });
        document.getElementById('drawActions').style.display = 'flex';
    }

    function updateUI() {
        document.getElementById('balDisplay').innerText = `$${state.balance.toLocaleString()}`;
        document.getElementById('p1_cost').innerText = `$${state.price}`;
        document.getElementById('p3_cost').innerText = `$${state.price * 3}`;
        document.getElementById('p5_cost').innerText = `$${state.price * 5}`;
        document.getElementById('p12_cost').innerText = `$${state.price * 12}`;
        document.getElementById('setPrice').value = state.price;
    }
    function renderMainGrid() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = state.prizes.map(p => `<div class="prize-card"><span class="prize-icon">${p.icon}</span><div class="prize-name">${p.name}</div><div class="prize-val">$${p.val}</div></div>`).join('');
    }
    function renderEditor() {
        const list = document.getElementById('prizeEditList');
        list.innerHTML = state.prizes.map((p, i) => `<div class="edit-row"><input type="text" value="${p.name}" oninput="state.prizes[${i}].name=this.value"><input type="number" step="0.01" value="${p.prob}" oninput="state.prizes[${i}].prob=parseFloat(this.value)||0; calcProbSum();"><input type="number" value="${p.val}" oninput="state.prizes[${i}].val=parseInt(this.value)||0"><button class="del-btn" onclick="removePrize(${i})">×</button></div>`).join('');
        calcProbSum();
    }
    function calcProbSum() {
        const sum = state.prizes.reduce((s, p) => s + p.prob, 0);
        const text = document.getElementById('probSumText');
        text.innerText = sum.toFixed(2) + '%';
        text.style.color = (Math.abs(sum - 100) < 0.01) ? "#4caf50" : "#f44336";
    }
    function addNewPrize() { state.prizes.push({ name: "新獎項", prob: 0, val: 0, icon: "🎁", isTop: false }); renderEditor(); }
    function removePrize(i) { state.prizes.splice(i, 1); renderEditor(); }
    function saveSettings() { state.price = parseInt(document.getElementById('setPrice').value) || 50; state.prizes.forEach(p => p.isTop = p.val > 5000); updateUI(); renderMainGrid(); closeModal('settingsModal'); }
    function runSlotAnim(idx, winner) {
        return new Promise(resolve => {
            const strip = document.getElementById(`strip-${idx}`);
            const pool = 35;
            let html = '';
            for(let i=0; i<pool; i++) {
                const rp = state.prizes[Math.floor(Math.random()*state.prizes.length)];
                html += `<div class="slot-item">${rp.icon}</div>`;
            }
            html += `<div class="slot-item">${winner.icon}</div>`;
            strip.style.transition = 'none'; strip.style.transform = 'translateY(0)'; strip.innerHTML = html; strip.offsetHeight;
            setTimeout(() => { strip.style.transition = 'transform 2.8s cubic-bezier(0.1, 0, 0.1, 1)'; strip.style.transform = `translateY(-${pool * 90}px)`; }, 50);
            setTimeout(() => { if(winner.isTop) document.getElementById(`slot-${idx}`).classList.add('win-top'); resolve(); }, 2900 + (idx * 80));
        });
    }
    function pickWinner() { let r = Math.random() * 100; let c = 0; for(let p of state.prizes) { c += p.prob; if(r < c) return p; } return state.prizes[state.prizes.length - 1]; }
    function pushRecord(name, l, g) { const list = document.getElementById('luckyList'); if(list.innerText.includes("暫無")) list.innerHTML = ''; const div = document.createElement('div'); div.className = 'lucky-item'; div.innerHTML = `恭喜！在第 <b style="color:var(--accent-gold)">${l}</b> 抽獲得：<b>${name}</b> (累計第 ${g} 抽)`; list.prepend(div); }
    function openModal(id) { if(id==='settingsModal') renderEditor(); document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function doRecharge(amt) { state.balance += amt; updateUI(); closeModal('rechargeModal'); }
    function retryDraw() { handleDraw(state.lastTimes); }
    function closeDraw() { document.getElementById('drawOverlay').style.display = 'none'; }
    function openInventory() {
        const list = document.getElementById('invList'); const valText = document.getElementById('recycleVal'); const total = state.inventory.reduce((s, i) => s + i.val, 0); valText.innerText = `$${total.toLocaleString()}`;
        if(state.inventory.length === 0) list.innerHTML = '<p style="text-align:center; padding:20px; color:#555;">賞櫃是空的</p>';
        else list.innerHTML = state.inventory.map(i => `<div class="inv-item"><span>${i.icon} ${i.name}</span><span style="color:var(--accent-gold)">$${i.val}</span></div>`).join('');
        openModal('invModal');
    }
    function recycleAll() { state.balance += state.inventory.reduce((s, i) => s + i.val, 0); state.inventory = []; updateUI(); closeModal('invModal'); }
    window.onload = init;
</script>
</body>
</html>
