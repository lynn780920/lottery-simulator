<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高級抽獎模擬器 V2</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            width: 95%;
            padding: 20px;
            text-align: center;
        }

        h1 { font-style: italic; color: var(--accent-color); text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }

        /* 設定區塊樣式 */
        .settings-panel {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #334155;
            text-align: left;
        }
        
        .setting-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 5px;
            align-items: center;
        }

        input {
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            padding: 5px;
            border-radius: 4px;
            width: 100%;
        }

        /* 按鈕樣式 */
        .btn-group { margin: 20px 0; }
        button {
            cursor: pointer;
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }
        button.secondary { background: #475569; }

        /* 統計區 */
        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .stat-box { font-size: 0.9rem; color: #94a3b8; }
        .stat-val { display: block; font-size: 1.2rem; color: #fbbf24; font-weight: bold; }

        /* 抽獎轉盤顯示區 */
        .spinner-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            min-height: 60px;
        }

        .spinner {
            width: 120px;
            height: 50px;
            border: 2px solid #38bdf8;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .spinner-content {
            display: flex;
            flex-direction: column;
            transition: transform 1.5s cubic-bezier(0.15, 0.85, 0.35, 1);
        }

        .spinner-item {
            height: 50px;
            line-height: 50px;
            text-align: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        /* 紀錄區 */
        .log-container {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
        }
        .log-item {
            border-bottom: 1px solid #334155;
            padding: 5px 0;
            font-size: 0.85rem;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 高級抽獎模擬器</h1>

    <div class="stats">
        <div class="stat-box">單次花費 <span id="priceDisplay" class="stat-val">$35</span></div>
        <div class="stat-box">已抽次數 <span id="totalDraws" class="stat-val">0</span></div>
        <div class="stat-box">累計花費 <span id="totalCost" class="stat-val">$0</span></div>
    </div>

    <button class="secondary" onclick="document.getElementById('setup').classList.toggle('hidden')">⚙️ 設定獎項與機率</button>
    
    <div id="setup" class="settings-panel hidden">
        <div class="setting-row" style="font-weight: bold; color: var(--accent-color);">
            <span>獎項名稱</span><span>機率(%)</span><span>顏色碼</span><span>預覽</span>
        </div>
        <div id="prizeInputs">
            </div>
        <p style="font-size: 0.8rem; color: #94a3b8;">* 最後一項機率會自動補齊至 100%</p>
        <div style="margin-top: 10px;">
            單抽價格：<input type="number" id="inputPrice" value="35" style="width: 80px;" onchange="updateSettings()"> 元
        </div>
    </div>

    <div class="btn-group">
        <button onclick="draw(1)">抽 1 次</button>
        <button onclick="draw(3)">抽 3 次</button>
        <button onclick="draw(10)">抽 10 次</button>
        <button onclick="draw(50)">抽 50 次</button>
    </div>

    <div class="spinner-container" id="spinnerContainer"></div>

    <h3 style="text-align: left;">📜 中獎紀錄 (僅記錄大獎)</h3>
    <div class="log-container" id="log">
        <div style="color: #64748b; text-align: center;">尚未有中獎紀錄</div>
    </div>
</div>

<script>
    // 初始獎項設定
    let prizeSettings = [
        { name: "頭獎!!", prob: 0.1, color: "#ff4444" },
        { name: "二獎", prob: 0.9, color: "#38bdf8" },
        { name: "三獎", prob: 2.0, color: "#4ade80" },
        { name: "普通獎", prob: 12.0, color: "#f8fafc" },
        { name: "安慰獎", prob: 85.0, color: "#94a3b8" }
    ];

    let costPerDraw = 35;
    let totalDraws = 0;
    let totalCost = 0;

    // 初始化輸入介面
    function initSettingsUI() {
        const container = document.getElementById('prizeInputs');
        container.innerHTML = '';
        prizeSettings.forEach((p, index) => {
            const isLast = index === prizeSettings.length - 1;
            container.innerHTML += `
                <div class="setting-row">
                    <input type="text" value="${p.name}" onchange="updateSettings(${index}, 'name', this.value)">
                    <input type="number" value="${p.prob}" ${isLast ? 'disabled' : ''} onchange="updateSettings(${index}, 'prob', this.value)">
                    <input type="text" value="${p.color}" onchange="updateSettings(${index}, 'color', this.value)">
                    <span style="color: ${p.color}; font-weight: bold;">■</span>
                </div>
            `;
        });
        document.getElementById('priceDisplay').innerText = `$${costPerDraw}`;
    }

    // 更新設定
    function updateSettings(index, key, value) {
        if (index !== undefined) {
            if (key === 'prob') prizeSettings[index][key] = parseFloat(value);
            else prizeSettings[index][key] = value;
        }
        
        costPerDraw = parseInt(document.getElementById('inputPrice').value);
        
        // 重新計算最後一項的機率
        let currentTotal = 0;
        for (let i = 0; i < prizeSettings.length - 1; i++) {
            currentTotal += prizeSettings[i].prob;
        }
        prizeSettings[prizeSettings.length - 1].prob = Math.max(0, 100 - currentTotal).toFixed(2) * 1;
        
        initSettingsUI();
    }

    // 隨機抽選邏輯
    function getPrize() {
        let rand = Math.random() * 100;
        let cumulative = 0;
        for (let p of prizeSettings) {
            cumulative += p.prob;
            if (rand < cumulative) return p;
        }
        return prizeSettings[prizeSettings.length - 1];
    }

    // 執行抽獎
    async function draw(times) {
        const container = document.getElementById('spinnerContainer');
        container.innerHTML = '';
        totalDraws += times;
        totalCost += times * costPerDraw;

        // 更新統計
        document.getElementById('totalDraws').innerText = totalDraws;
        document.getElementById('totalCost').innerText = `$${totalCost}`;

        for (let i = 0; i < times; i++) {
            const targetPrize = getPrize();
            
            // 建立轉盤
            const spinner = document.createElement('div');
            spinner.className = 'spinner';
            const content = document.createElement('div');
            content.className = 'spinner-content';
            
            // 隨機填充 10 個假的項目增加滾動感
            const fakeCount = 10;
            for(let j=0; j<fakeCount; j++) {
                const fake = prizeSettings[Math.floor(Math.random()*prizeSettings.length)];
                content.innerHTML += `<div class="spinner-item" style="color:${fake.color}">${fake.name}</div>`;
            }
            // 最後一個是真正結果
            content.innerHTML += `<div class="spinner-item" style="color:${targetPrize.color}">${targetPrize.name}</div>`;
            
            spinner.appendChild(content);
            container.appendChild(spinner);

            // 觸發動畫
            setTimeout(() => {
                content.style.transform = `translateY(-${fakeCount * 50}px)`;
            }, i * 50); // 逐個啟動動畫

            // 紀錄大獎
            if (targetPrize.prob < 5) { // 機率小於 5% 的視為大獎紀錄
                addLog(targetPrize);
            }
        }
    }

    function addLog(prize) {
        const log = document.getElementById('log');
        if (log.innerHTML.includes('尚未有中獎紀錄')) log.innerHTML = '';
        
        const time = new Date().toLocaleTimeString();
        const item = document.createElement('div');
        item.className = 'log-item';
        item.innerHTML = `<span style="color: #64748b;">[${time}]</span> 恭喜抽中 <span style="color:${prize.color}; font-weight:bold;">${prize.name}</span>`;
        log.prepend(item);
    }

    // 初始化介面
    initSettingsUI();
</script>

</body>
</html>
